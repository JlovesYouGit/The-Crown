[QuantumRenderService]
# AMD Quantum Rendering Service Configuration

# Model settings
ModelPath=../Models/quantum_render_optimization.gguf
ModelType=GGUF
ModelQuantization=Q4_K_M

# Rendering settings
TargetFPS=60
MaxMeshes=100
QuantumPrecision=high

# Memory management
VRAMLimitMB=4096
CompressionLevel=7
QBitCompression=true

# Physics processing
PhysicsProcessingEnabled=true
Gravity=9.81
Friction=0.1
Elasticity=0.8
AirResistance=0.05
TimeStep=0.016

# Hyperprocessing
HyperprocessingEnabled=true
HyperprocessingBoost=1.5
QBitsToProcess=20

# Logging
LogLevel=info
LogToFile=true
LogFile=quantum_render_service.log

# Performance
ThreadPriority=high
BackgroundProcessing=true
AutoStart=true