name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Lint with ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check --output-format=github --select=E9,F63,F7,F82 .
        # Check all rules but allow to continue
        ruff check --output-format=github .

    - name: Format check with ruff
      run: |
        ruff format --check .

    - name: Type check with mypy
      run: |
        mypy spectrum_grabber/
        # Also check test files but be more lenient
        mypy tests/ --ignore-missing-imports --allow-untyped-defs

    - name: Security check with bandit
      run: |
        bandit -r spectrum_grabber/ -f json -o bandit-report.json
        bandit -r spectrum_grabber/ --severity-level medium

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=spectrum_grabber --cov-report=xml --cov-report=html --cov-report=term-missing

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: true

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Run WiFi scanner tests (Windows-specific)
      run: |
        # Run only WiFi scanner tests on Windows since netsh is Windows-specific
        pytest tests/test_wifi_scanner.py -v

    - name: Run integration tests
      run: |
        pytest tests/test_integration.py -v
        
  dependency-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Run security audit
      run: |
        pip-audit --desc --format=json --output audit-report.json
        pip-audit --desc
